services:
  postgres:
    image: postgres:17
    container_name: tk-postgres-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tkdatabase

    ports:
      - "5432:5432"

    volumes:
      - tk_postgres_data:/var/lib/postgresql/data

volumes:
  tk_postgres_data:
